name: xmtp_plugin
description: "A Flutter plugin for XMTP decentralized messaging. Supports DMs, group chats, content codecs, consent management, and real-time streaming across Android, iOS, Windows, and Web."
version: 1.0.4
homepage: https://github.com/0xjmsl/xmtp_plugin
repository: https://github.com/0xjmsl/xmtp_plugin
issue_tracker: https://github.com/0xjmsl/xmtp_plugin/issues

environment:
  sdk: ^3.5.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  plugin_platform_interface: ^2.0.2
  http: ^1.3.0
  web3dart: ^3.0.1
  crypto: ^3.0.6
  wallet: ^0.0.18
  protobuf: ^5.0.0
  pointycastle: ^4.0.0
  flutter_rust_bridge: 2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  plugin:
    platforms:
      android:
        package: io.xmtp.xmtp_plugin
        pluginClass: XmtpPlugin
      ios:
        pluginClass: XmtpPlugin
      windows:
        dartPluginClass: XmtpPluginWindows
        fileName: xmtp_plugin_windows.dart
      web:
        pluginClass: XmtpPluginWeb
        fileName: xmtp_plugin_web.dart
